name: Deploy Workflow

on:
    push:
        branches:
            - main

permissions:
    id-token: write
    contents: read
    security-events: write

env:
    AWS_REGION: ${{ vars.AWS_REGION }}
    STATE_BUCKET: ${{ vars.STATE_BUCKET }}
    ENV_NAME: ${{ vars.ENV_NAME }}

jobs:
    terraform:
        name: Terraform Apply
        runs-on: ubuntu-latest
        strategy:
            max-parallel: 1
            matrix:
                module: [security, certificates, networking, storage, compute, monitoring]

        defaults:
            run:
                working-directory: ${{ github.workspace }}/env/dev/${{ matrix.module }}

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ${{ env.AWS_REGION }}

            - name: Terraform setup
              uses: hashicorp/setup-terraform@v3

            - name: Login to Amazon ECR
              if: matrix.module == 'monitoring'
              id: login-ecr
              uses: aws-actions/amazon-ecr-login@v2

            - name: Build and Push Monitoring Images
              if: matrix.module == 'monitoring'
              env:
                ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
              # The paths are updated to point to your new storage directory
              run: |
                echo "Building and pushing Grafana..."
                docker build -t $ECR_REGISTRY/${{ env.ENV_NAME }}-grafana:latest ${{ github.workspace }}/env/dev/storage/grafana/
                docker push $ECR_REGISTRY/${{ env.ENV_NAME }}-grafana:latest

                echo "Building and pushing Prometheus..."
                docker build -t $ECR_REGISTRY/${{ env.ENV_NAME }}-prometheus:latest ${{ github.workspace }}/env/dev/storage/prometheus/
                docker push $ECR_REGISTRY/${{ env.ENV_NAME }}-prometheus:latest

                echo "Building and pushing Loki..."
                docker build -t $ECR_REGISTRY/${{ env.ENV_NAME }}-loki:latest ${{ github.workspace }}/env/dev/storage/loki/
                docker push $ECR_REGISTRY/${{ env.ENV_NAME }}-loki:latest

            - name: Terraform Init
              run: |
                STATE_KEY="env/dev/${{ matrix.module }}/terraform.tfstate"
                terraform init \
                  -backend-config="bucket=${{ env.STATE_BUCKET }}" \
                  -backend-config="key=$STATE_KEY" \
                  -backend-config="region=${{ env.AWS_REGION }}" \
                  -backend-config="use_lockfile=true" \
                  -var-file=../../global/variables.tfvars
                
            - name: Terraform Validate
              run: terraform validate

            - name: Terraform Plan
              run: terraform plan -out=tfplan -var-file=../../global/variables.tfvars

            - name: Terraform Apply
              run: terraform apply -auto-approve tfplan
