name: Destroy Workflow

on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Type "Destroy" to confirm the destruction of the environment'
                required: true
                default: 'NO'

permissions:
    id-token: write
    contents: read
    security-events: write

jobs:
    destroy_infrastructure:
        name: Terraform Destroy
        runs-on: ubuntu-latest
        if: github.event.inputs.environment == 'Destroy'
        strategy:
            max-parallel: 1
            matrix:
                module: [monitoring, compute, storage, networking, certificates, security]

        defaults:
            run:
                working-directory: ../env/dev/${{ matrix.module }}

        steps:
            - name: Checkout Repository
              uses: actions/checkout@v3

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v4
              with:
                role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                aws-region: ${{ env.AWS_REGION }}

            - name: Terraform setup
              uses: hashicorp/setup-terraform@v3
            
            - name: Terraform Init
              run: |
                STATE_KEY="env/dev/${{ matrix.module }}/terraform.tfstate"
                terraform init \
                  -backend-config="bucket=${{ env.STATE_BUCKET }}" \
                  -backend-config="key=$STATE_KEY" \
                  -backend-config="region=${{ env.AWS_REGION }}" \
                  -backend-config="use_lockfile=true"

            - name: Terraform Destroy
              run: terraform destroy -auto-approve -var-file=../../global/variables.tfvars