apiVersion: v1alpha1
static:
  - namespace: AWS/Lambda
    name: dev-lambda-metrics # Just a label for Grafana
    regions:
      - eu-central-1
    dimensions:
      - name: FunctionName
        value: dev-lambda-web-app
    metrics:
      - name: Invocations
        statistics: [Sum]
        period: 60
        length: 300
      - name: Errors
        statistics: [Sum]
        period: 60
        length: 300
      - name: Duration
        statistics: [Average, Maximum]
        period: 60
        length: 300